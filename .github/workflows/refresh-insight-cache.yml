name: Refresh Insight Cache Weekly

on:
  schedule:
    # 매주 일요일 03:00 (KST) = 매주 토요일 18:00 (UTC)
    - cron: '0 18 * * 6'
  workflow_dispatch:

jobs:
  refresh-insight-cache:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INSIGHT_API_BASE_URL: ${{ secrets.INSIGHT_API_BASE_URL || 'https://libscope2.netlify.app/api/insight-api' }}
      INSIGHT_REFRESH_SCOPE: all
      INSIGHT_REFRESH_CONCURRENCY: 6
      INSIGHT_REFRESH_SLEEP_MS: 250
      INSIGHT_INCLUDE_CACHE_META: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required configuration
        run: |
          if [ -z "$INSIGHT_API_BASE_URL" ]; then
            echo "::error::INSIGHT_API_BASE_URL is required. Set it in repository secrets (예: https://your-site.netlify.app/api/insight-api)"
            exit 1
          fi
          echo "Using insight API base URL: $INSIGHT_API_BASE_URL"

      - name: Refresh insight cache
        run: npm run refresh:insight-cache
