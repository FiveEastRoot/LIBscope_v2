name: Verify Production Visuals

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 매일 10:00 (KST) = 01:00 (UTC)
    - cron: '0 1 * * *'

jobs:
  verify-deploy-visuals:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VISUAL_VERIFY_URL: ${{ secrets.VISUAL_VERIFY_URL || 'https://libscope2.netlify.app/' }}
      VISUAL_VERIFY_REPORT_PATH: visual-verify/report.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for production deploy
        if: github.event_name == 'push'
        shell: pwsh
        run: Start-Sleep -Seconds 180

      - name: Verify production population visuals
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Visual verification attempt $attempt of $maxAttempts"
            npm run verify:deploy-visuals
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              $sleepSeconds = 45 * $attempt
              Write-Host "Visual verification failed. Waiting $sleepSeconds seconds before retry..."
              Start-Sleep -Seconds $sleepSeconds
            }
          }
          exit $LASTEXITCODE

      - name: Upload visual verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-verification-report
          path: visual-verify/report.json
          if-no-files-found: ignore
