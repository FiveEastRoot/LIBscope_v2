name: Verify Production Visuals

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 매일 10:00 (KST) = 01:00 (UTC)
    - cron: '0 1 * * *'

jobs:
  verify-deploy-visuals:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VISUAL_VERIFY_URL: ${{ secrets.VISUAL_VERIFY_URL || 'https://libscope2.netlify.app/' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for production deploy
        if: github.event_name == 'push'
        shell: pwsh
        run: Start-Sleep -Seconds 90

      - name: Verify production population visuals
        run: npm run verify:deploy-visuals
